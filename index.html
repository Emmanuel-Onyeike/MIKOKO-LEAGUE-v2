<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIKOKO LEAGUE | Tech Nxxt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        heading: ['Syncopate', 'sans-serif'],
                        body: ['Space Grotesk', 'sans-serif'],
                    },
                    colors: {
                        nxxt: { red: '#FF0000', dark: '#050505', glass: 'rgba(20, 20, 20, 0.8)' }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #050505; color: white; font-family: 'Space Grotesk', sans-serif; overflow: hidden; }
        .nxxt-bg { background: radial-gradient(circle at 50% 50%, #1a0000 0%, #050505 100%); position: relative; }
        .modal-overlay { 
            display: none; position: fixed; inset: 0; 
            background: rgba(0,0,0,0.98); backdrop-filter: blur(25px);
            z-index: 100; align-items: center; justify-content: center; 
        }
        .modal-active { display: flex; animation: nxxtZoom 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes nxxtZoom { from { opacity: 0; transform: scale(1.1); } to { opacity: 1; transform: scale(1); } }
        .grid-lines {
            background-image: linear-gradient(to right, rgba(255,0,0,0.05) 1px, transparent 1px), 
                              linear-gradient(to bottom, rgba(255,0,0,0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }
    </style>
</head>
<body class="nxxt-bg flex flex-col min-h-screen overflow-x-hidden">

    <header class="w-full p-4 md:p-6 flex justify-between items-center z-20">
        <div class="flex items-center gap-3">
            <div class="w-7 h-7 border border-red-600 flex items-center justify-center font-heading text-[9px]">M</div>
            <span class="font-heading text-[8px] tracking-[0.2em] hidden xs:block uppercase">Secure_Link</span>
        </div>
        <div class="font-mono text-[9px] text-zinc-500 uppercase">MAR 17 2026 // <span id="clock">00:00:00</span></div>
    </header>

    <main class="flex-1 flex flex-col items-center justify-center px-6 py-8 text-center z-10">
        
        <div class="relative group mb-6">
            <div class="absolute -inset-6 border border-red-600/10 rounded-full animate-[spin_15s_linear_infinite] pointer-events-none"></div>
            <h1 class="font-heading text-4xl sm:text-6xl md:text-9xl font-bold tracking-tighter italic leading-[0.9] uppercase">
                MIKOKO<br>
                <span class="text-white drop-shadow-[0_0_15px_rgba(255,0,0,0.4)]">LEAGUE</span>
            </h1>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-3 max-w-4xl w-full my-8">
            <div class="border border-white/5 bg-white/5 p-3 text-left backdrop-blur-md">
                <span class="text-[8px] font-heading text-red-600 uppercase">Archive</span>
                <p class="text-[10px] text-zinc-400 tracking-wider uppercase mt-1">Institutional limits. Restricted flow.</p>
            </div>
            <div class="border border-red-600/30 bg-red-900/5 p-3 text-left backdrop-blur-md">
                <span class="text-[8px] font-heading text-white uppercase">The Edge</span>
                <p class="text-[10px] text-white tracking-wider uppercase mt-1">Unified strength. No level barriers.</p>
            </div>
            <div class="border border-white/5 bg-white/5 p-3 text-left backdrop-blur-md">
                <span class="text-[8px] font-heading text-red-600 uppercase">Status</span>
                <p class="text-[10px] text-zinc-400 tracking-wider uppercase mt-1">Shattering the restricted barrier.</p>
            </div>
        </div>

        <div class="relative z-30 mt-4">
            <button onclick="triggerAlert('ACCESS_REQUEST', 'Unified Arena Verified. Strengths mixing... Ready for Season 2026.')" 
                    class="group relative px-10 py-4 border border-white/20 hover:border-red-600 transition-all duration-500 active:scale-95">
                <span class="relative z-10 font-heading text-xs tracking-[0.4em] group-hover:text-white">INITIATE</span>
                <div class="absolute inset-0 bg-red-600 scale-x-0 group-hover:scale-x-100 transition-transform origin-left duration-500"></div>
            </button>
        </div>
    </main>

    <footer class="w-full flex flex-col items-center py-8 group cursor-pointer z-20 mt-auto" 
            onclick="triggerAlert('TECH_NXXT_INFO', 'Tech Nxxt Infrastructure v4.2.0. All systems operational.')">
        <p class="text-[7px] font-heading tracking-[0.5em] mb-1 text-zinc-700 group-hover:text-red-500 transition uppercase">Engineered By</p>
        <h2 class="font-heading text-lg tracking-tighter uppercase">TECH <span class="text-red-600">NXXT</span></h2>
    </footer>

    <div id="nxxtModal" class="modal-overlay">
        <div class="bg-zinc-950 border-t-4 border-red-600 p-1 max-w-md w-full mx-4 shadow-[0_0_50px_rgba(255,0,0,0.2)]">
            <div class="bg-zinc-900 border border-white/10 p-10 text-center relative">
                <div class="absolute top-0 left-0 w-4 h-4 border-t-2 border-l-2 border-red-600"></div>
                <div class="absolute bottom-0 right-0 w-4 h-4 border-b-2 border-r-2 border-red-600"></div>
                <h3 id="modalTitle" class="font-heading text-xl mb-4 tracking-tight text-red-500 uppercase">SYSTEM ALERT</h3>
                <p id="modalBody" class="text-zinc-400 text-xs leading-relaxed mb-10 uppercase tracking-[0.2em]">Processing...</p>
                <div id="modalActions"></div>
            </div>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toTimeString().split(' ')[0];
        }
        setInterval(updateClock, 1000);
        updateClock();

        const modal = document.getElementById('nxxtModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalBody = document.getElementById('modalBody');
        const modalActions = document.getElementById('modalActions');

        function triggerAlert(type, message) {
            modalTitle.innerText = type.replace(/_/g, ' ');
            modalBody.innerText = message;
            modalActions.innerHTML = '';
            const btn = document.createElement('button');
            btn.className = "w-full py-4 bg-red-600 font-heading text-[10px] tracking-[0.3em] hover:bg-white hover:text-black transition-all";
            
            if (type === 'ACCESS_REQUEST') {
                btn.innerText = "CONFIRM ENTRY";
                btn.onclick = () => {
                    btn.innerText = "REDIRECTING...";
                    setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
                };
            } else {
                btn.innerText = "ACKNOWLEDGE";
                btn.onclick = () => modal.classList.remove('modal-active');
            }
            modalActions.appendChild(btn);
            modal.classList.add('modal-active');
        }
    </script>
</body>
</html>
